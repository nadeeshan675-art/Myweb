<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        /* PC එකේ සාමාන්‍යයෙන් පෙනෙන විදිහ */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .invoice-container {
            background: #fff;
            padding: 40px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        /* ලෝගෝ එක සහ කම්පැනි විස්තර වම් පැත්තේ උඩට සකස් කිරීම */
        .invoice-header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .company-logo {
            max-width: 150px; /* ලෝගෝ එකේ ප්‍රමාණය */
            max-height: 80px;
            margin-right: 20px; /* ලෝගෝ එකට දකුණු පසින් ඉඩ තැබීම */
        }
        .company-details {
            text-align: left;
        }

        /* ප්‍රින්ට් කරද්දී ක්‍රියාත්මක වන විශේෂ CSS */
        @media print {
            body {
                background-color: #fff;
                margin: 0;
            }
            .invoice-container {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
            }
            .print-button {
                display: none; /* ප්‍රින්ට් එකේදී බටන් එක හංගන්න */
            }
        }
    </style>
</head>
<body>

<div class="invoice-container">
    <!-- වම් පැත්තේ උඩින් ලෝගෝ එක එන Header කොටස -->
    <div class="invoice-header">
        <!-- මෙතනින් ඔයා upload කරපු ලෝගෝ එක auto ඇදලා ගන්නවා -->
        <img src="/static/images/{{ company.logo }}" alt="Company Logo" class="company-logo">
        <div class="company-details">
            <h2>{{ company.name }}</h2>
            <p>ලිපිනය: කොළඹ, ශ්‍රී ලංකාව</p>
            <p>දුරකථන: 011-XXXXXXX</p>
        </div>
    </div>

    <!-- ඉන්වොයිස් එකේ ඉතිරි විස්තර (බිල් අයිතම) මෙතනට එනවා -->
    <div class="invoice-body">
        <h3>INVOICE</h3>
        <p>දිනය: 19/07/2026</p>
        <!-- බිල් එකේ table එක මෙතනට දාන්න පුළුවන් -->
    </div>
    
    <br>
    <button class="print-button" onclick="window.print()">Print Invoice</button>
</div>

</body>
</html>
